    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="48" fill="url(#bg)"/>
  <text x="80" y="170" font-size="88" font-family="Arial, sans-serif" fill="#93c5fd">IBM</text>
  <text x="80" y="280" font-size="58" font-family="Arial, sans-serif" fill="white">Professional Certificate</text>
  <text x="80" y="360" font-size="42" font-family="Arial, sans-serif" fill="#dbeafe">Issued to Vinay</text>
